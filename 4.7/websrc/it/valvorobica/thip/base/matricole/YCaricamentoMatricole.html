<html>
<head>
<style>
.importa {
	background-color: #666666;
	color: #FFFFFF;
	font-family: Arial, Helvetica, sans-serif;
	padding: 0px;
	font-size: 18pt;
	cursor: pointer;
	font-weight: bolder;
	height: 40px;
	width: 159px;
}

.title {
	text-align: center;
	color: #FFFFFF;
	border: 1px solid black;
	background-color: #666666;
	padding-top: 1rem;
	padding-bottom: 1rem;
}

.file {
	border: 1px solid #999;
	border-radius: 3px;
	padding: 5px 8px;
	white-space: nowrap;
	cursor: pointer;
	text-shadow: 1px 1px #fff;
	font-weight: 700;
	font-size: 10pt;
	width: 500px;
	height: 350px;
}

.cell {
	text-align: center;
	padding-bottom: 5px;
}
</style>
</head>
<body
	style="margin: 0px; overflow: hidden; background-color: rgb(232, 232, 232);">
	<form name="YCaricamentoMatricoleForm" method="post"
		enctype="multipart/form-data">
		<table height="100%" width="100%" cellspacing="0" cellpadding="0"
			id="emptyborder" style="background-color: rgb(232, 232, 232);">

			<tr>
				<td>
					<table style="height: 70%;">
						<tr>
							<td class="cell">
								<h1 class="title">IMPORTAZIONE MATRICOLE VALVO</h1>
							</td>
						</tr>
						<tr>
							<td class="cell"><input class="file" type="file" id="file"
								name="file"></input></td>
						</tr>
						<tr>
							<td class="cell" style="padding-bottom: 5rem;">
								<button class="importa" id="importa" name="importa">IMPORTA</button>
							</td>
						</tr>
					</table>
				</td>
			</tr>

			<tr>
				<td style="height: 0"><span class="errorlist" /></td>
			</tr>
		</table>
	</form>
</body>
</html>
